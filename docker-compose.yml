services:
  backend:
    build: ./backend
    container_name: sgi_backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app 
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - sgi_network

networks:
  sgi_network:
    driver: bridge